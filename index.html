<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyPro AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #8b5cf6; --text: #fafafa; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 100px; 
            box-sizing: border-box;
        }

        .header { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 20px; 
            color: var(--primary); 
        }

        /* Fixed Alignment Card */
        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 24px; 
            border: 1px solid #27272a; 
            margin-bottom: 20px;
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            gap: 20px; /* Creates perfect space between text and box */
            align-items: stretch;
        }

        #instruction {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            color: #d4d4d8;
        }
        
        /* Fixed Upload Zone */
        .upload-zone { 
            border: 2px dashed #3f3f46; 
            border-radius: 15px; 
            padding: 35px 15px; 
            text-align: center; 
            background: rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #pdf-input { display: none; }
        
        .loader { 
            display: none; 
            text-align: center;
            color: var(--primary); 
            font-weight: bold; 
            margin-top: 10px;
        }

        #output { line-height: 1.6; color: #d4d4d8; white-space: pre-wrap; }
        .highlight { color: var(--primary); font-weight: bold; margin-bottom: 8px; display: block; }

        /* Navigation */
        .nav { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(18, 18, 18, 0.95); 
            backdrop-filter: blur(10px);
            display: flex; 
            padding: 15px 0; 
            border-top: 1px solid #27272a; 
            justify-content: space-around;
        }
        .nav-btn { 
            background: none; 
            border: none; 
            color: #71717a; 
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .nav-btn.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">AI Study Notes</div>

    <div class="card">
        <p id="instruction">Upload a PDF to generate AI notes. Your summaries will appear below.</p>

        <label class="upload-zone">
            <input type="file" id="pdf-input" accept="application/pdf">
            <span style="font-size: 30px; margin-bottom: 10px;">📂</span>
            <span id="file-name" style="font-weight: 600;">Tap to select PDF</span>
        </label>

        <div class="loader" id="loader">🧠 AI is analyzing...</div>
    </div>

    <div class="card" id="result-card" style="display:none;">
        <div id="output"></div>
    </div>

    <nav class="nav">
        <button class="nav-btn active">
            <span class="nav-icon">📝</span>
            <span>Notes</span>
        </button>
        <button class="nav-btn">
            <span class="nav-icon">✍️</span>
            <span>Quiz</span>
        </button>
        <button class="nav-btn">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </button>
    </nav>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        const resultCard = document.getElementById('result-card');
        const fileNameLabel = document.getElementById('file-name');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileNameLabel.innerText = file.name;
            loader.style.display = 'block';
            resultCard.style.display = 'none';

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    let extractedText = "";
                    const maxPages = Math.min(pdf.numPages, 3);
                    
                    for(let i=1; i <= maxPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        extractedText += content.items.map(s => s.str).join(" ");
                    }

                    showMockAI(extractedText);
                } catch (err) {
                    alert("Error reading PDF. Try a smaller file.");
                    loader.style.display = 'none';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function showMockAI(text) {
            setTimeout(() => {
                loader.style.display = 'none';
                resultCard.style.display = 'block';
                
                const preview = text.length > 10 ? text.substring(0, 250) + "..." : "No text found in PDF.";
                
                output.innerHTML = `
                    <span class="highlight">✨ AI SUMMARY</span>
                    <p>${preview}</p>
                    <span class="highlight">💡 KEY TAKEAWAYS</span>
                    <ul style="padding-left: 20px; margin-top: 5px;">
                        <li>Primary topic identified from content.</li>
                        <li>Key terminology extracted.</li>
                        <li>Ready for quiz generation.</li>
                    </ul>
                `;
            }, 1500);
        }
    </script>
</body>
</html>
