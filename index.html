<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyPro AI - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #8b5cf6; --text: #fafafa; --border: #27272a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px 20px 100px 20px; }
        .container { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }
        .header { font-size: 28px; font-weight: 800; color: var(--primary); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        .upload-zone { border: 2px dashed #3f3f46; border-radius: 15px; padding: 40px 10px; text-align: center; background: rgba(255,255,255,0.02); cursor: pointer; }
        #pdf-input { display: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; }
        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; }
        #output-area { white-space: pre-wrap; font-size: 15px; color: #d4d4d8; line-height: 1.6; }
        .highlight { color: var(--primary); font-weight: 800; }
        
        /* Flashcard Design */
        .flash-box { background: #2e1065; padding: 40px 20px; border-radius: 15px; text-align: center; min-height: 180px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--primary); font-weight: bold; font-size: 18px; margin-top: 10px; }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); display: flex; padding: 15px 0; border-top: 1px solid var(--border); justify-content: space-around; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #71717a; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        input[type="password"] { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-view">
            <div class="header" id="view-title">AI Study Pro</div>
            <div class="card">
                <label class="upload-zone">
                    <input type="file" id="pdf-input" accept="application/pdf">
                    <span id="file-name">📚 Tap to Select PDF</span>
                </label>
                <div class="loader" id="loader">🧠 AI is processing...</div>
            </div>
            <div class="card" id="result-card" style="display:none;"><div id="output-area"></div></div>
        </div>

        <div id="settings-view" style="display:none;">
            <div class="header">System</div>
            <div class="card">
                <label>Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Paste Key Here...">
                <button class="btn" onclick="saveKey()">Save & Activate</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="changeTab('notes', this)"><span>📝</span><span>Notes</span></button>
        <button class="nav-btn" onclick="changeTab('quiz', this)"><span>✍️</span><span>Quiz</span></button>
        <button class="nav-btn" onclick="changeTab('flash', this)"><span>🃏</span><span>Cards</span></button>
        <button class="nav-btn" onclick="changeTab('settings', this)"><span>⚙️</span><span>Settings</span></button>
    </nav>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfText = "";

        function changeTab(tab, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const isSettings = tab === 'settings';
            document.getElementById('main-view').style.display = isSettings ? 'none' : 'block';
            document.getElementById('settings-view').style.display = isSettings ? 'block' : 'none';
            
            if(!isSettings) document.getElementById('view-title').innerText = "AI " + tab.charAt(0).toUpperCase() + tab.slice(1);
            if(pdfText && !isSettings) callAI(tab);
        }

        function saveKey() {
            localStorage.setItem('gemini_key', document.getElementById('api-key').value.trim());
            alert("Key Saved!");
        }
        document.getElementById('api-key').value = localStorage.getItem('gemini_key') || "";

        document.getElementById('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const key = localStorage.getItem('gemini_key');
            if(!key) return alert("Go to Settings first!");
            
            document.getElementById('loader').style.display = 'block';
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                pdfText = "";
                for(let i=1; i <= Math.min(pdf.numPages, 3); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    pdfText += content.items.map(s => s.str).join(" ");
                }
                document.getElementById('file-name').innerText = file.name;
                callAI('notes');
            };
            reader.readAsArrayBuffer(file);
        });

        async function callAI(mode) {
            const key = localStorage.getItem('gemini_key');
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';

            let prompt = `Summarize this text: ${pdfText}`;
            if(mode === 'quiz') prompt = `Create 3 MCQs with answers for: ${pdfText}`;
            if(mode === 'flash') prompt = `Give me one major question and its answer from this text. Format it as 'Question: [question] Answer: [answer]': ${pdfText}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-card').style.display = 'block';
                
                if(mode === 'flash') {
                    const parts = aiResponse.split('Answer:');
                    const q = parts[0].replace('Question:', '').trim();
                    const a = parts[1] ? parts[1].trim() : "Tap to see answer";
                    document.getElementById('output-area').innerHTML = `
                        <div class="flash-box" id="fcard" onclick="this.innerText === '${q}' ? this.innerText='${a}' : this.innerText='${q}'">${q}</div>
                        <p style="text-align:center; font-size:12px; margin-top:10px;">Tap the card to flip</p>
                    `;
                } else {
                    document.getElementById('output-area').innerHTML = `<span class="highlight">${mode.toUpperCase()}</span><br>${aiResponse.replace(/\n/g, '<br>')}`;
                }
            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
