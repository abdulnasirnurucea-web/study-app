<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Study Pro - Mobile</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #09090b;
            --text-color: #fafafa;
            --highlight-color: #8b5cf6; 
            --card-bg: #18181b;
            --border-color: #27272a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            box-sizing: border-box;
        }

        .header { 
            font-size: 24px; 
            font-weight: 800; 
            margin-bottom: 25px; 
            color: var(--highlight-color);
            letter-spacing: -0.5px;
        }

        /* Fixed Note Container */
        .note-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ai-text { 
            line-height: 1.6; 
            font-size: 16px; 
            color: #d4d4d8;
        }
        
        .keyword {
            background-color: var(--highlight-color);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-block;
            margin: 2px 0;
        }

        /* Redesigned Upload UI */
        .upload-wrapper {
            border: 2px dashed #3f3f46;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .upload-wrapper:active {
            transform: scale(0.98);
            border-color: var(--highlight-color);
        }

        #pdfInput { display: none; }

        /* Diagnostic Box */
        .diag-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 11px;
            display: none;
            color: #4ade80;
        }

        /* Navigation */
        .navbar {
            position: fixed; 
            bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-around;
            padding: 12px 0; 
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-item { 
            text-align: center; 
            font-size: 12px; 
            color: #71717a; 
            background: none; 
            border: none;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--highlight-color); }
        .nav-icon { font-size: 20px; }

        button.primary-btn {
            background: var(--highlight-color);
            color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; width: 100%;
            font-size: 15px;
        }

        .reset-btn { background: #450a0a; color: #f87171; margin-top: 20px; font-size: 13px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">Study Notes</div>
        <div class="note-container">
            <div class="ai-text" id="status-text">
                Welcome. Upload a <span class="keyword">PDF</span> to generate notes. 
                Your settings are automatically <span class="keyword">Saved</span>.
            </div>
            
            <label for="pdfInput" class="upload-wrapper">
                <span style="font-size: 30px;">📂</span>
                <span id="file-label" style="font-weight: 600;">Click to Select PDF</span>
                <input type="file" id="pdfInput" accept=".pdf">
            </label>
        </div>
    </div>

    <div id="system-view" style="display:none;">
        <div class="header">System Settings</div>
        <div class="note-container">
            <h4 style="margin:0">Theme Settings</h4>
            <p style="font-size: 13px; color: #a1a1aa; margin-bottom: 10px;">Customize your highlight color:</p>
            <input type="color" id="colorPicker" value="#8b5cf6" style="width:100%; height:50px; border-radius: 10px; border: none; background: none; cursor: pointer;">
            
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

            <h4 style="margin:0">App Health</h4>
            <button class="primary-btn" onclick="runDiagnostic()" style="margin-top:10px;">🔍 Run System Check</button>
            <div id="diag-output" class="diag-box"></div>
            
            <button class="nav-item reset-btn" onclick="fullReset()">Factory Reset App</button>
        </div>
    </div>

    <nav class="navbar">
        <button class="nav-item active" onclick="toggleView('notes')">
            <span class="nav-icon">📝</span><span>Notes</span>
        </button>
        <button class="nav-item" onclick="toggleView('quiz')">
            <span class="nav-icon">✍️</span><span>Quiz</span>
        </button>
        <button class="nav-item" onclick="toggleView('system')">
            <span class="nav-icon">⚙️</span><span>System</span>
        </button>
    </nav>

    <script>
        const colorPicker = document.getElementById('colorPicker');
        
        // Persistent Theme
        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('userTheme');
            if (savedColor) {
                document.documentElement.style.setProperty('--highlight-color', savedColor);
                colorPicker.value = savedColor;
            }
        });

        colorPicker.addEventListener('input', (e) => {
            const newColor = e.target.value;
            document.documentElement.style.setProperty('--highlight-color', newColor);
            localStorage.setItem('userTheme', newColor);
        });

        // Navigation
        function toggleView(view) {
            const notes = document.getElementById('main-view');
            const system = document.getElementById('system-view');
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            if(view === 'system') {
                notes.style.display = 'none';
                system.style.display = 'block';
                navItems[2].classList.add('active');
            } else {
                notes.style.display = 'block';
                system.style.display = 'none';
                navItems[0].classList.add('active');
            }
        }

        // File Selection Feedback
        document.getElementById('pdfInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "Select PDF";
            document.getElementById('file-label').innerText = fileName;
            document.getElementById('status-text').innerHTML = `Selected: <span class="keyword">${fileName}</span>. Ready to process.`;
        });

        // Diagnostic Tool
        function runDiagnostic() {
            const output = document.getElementById('diag-output');
            output.style.display = 'block';
            output.innerHTML = "Initializing...<br>";
            
            const checks = [
                { msg: "> PDF Engine: Ready", delay: 400 },
                { msg: "> Storage: Connected", delay: 800 },
                { msg: `> Network: ${navigator.onLine ? 'Online' : 'Offline'}`, delay: 1200 },
                { msg: "<br><strong>SYSTEM OPTIMIZED</strong>", delay: 1600 }
            ];

            checks.forEach(check => {
                setTimeout(() => { output.innerHTML += check.msg + "<br>"; }, check.delay);
            });
        }

        function fullReset() {
            if(confirm("Reset all settings?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
