<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyPro AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #8b5cf6; --text: #fafafa; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #27272a; margin-bottom: 20px; }
        
        /* Upload Area */
        .upload-zone { border: 2px dashed #3f3f46; border-radius: 12px; padding: 30px; text-align: center; background: rgba(255,255,255,0.02); }
        #pdf-input { display: none; }
        
        /* Loading Animation */
        .loader { display: none; margin: 20px 0; color: var(--primary); font-weight: bold; }
        .loader span { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* Output Styling */
        #output { line-height: 1.6; color: #d4d4d8; white-space: pre-wrap; }
        .highlight { color: var(--primary); font-weight: bold; }

        /* Navbar */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #121212; display: flex; padding: 15px; border-top: 1px solid #27272a; justify-content: space-around; }
        .nav-btn { background: none; border: none; color: #71717a; font-size: 12px; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">AI Study Notes</div>

    <div class="card">
        <div id="status-area">
            <p id="instruction">Upload a PDF to generate AI notes.</p>
        </div>

        <label class="upload-zone" id="drop-area">
            <input type="file" id="pdf-input" accept="application/pdf">
            <span id="file-name">📂 Tap to select PDF</span>
        </label>

        <div class="loader" id="loader">🧠 AI is analyzing <span>...</span></div>
    </div>

    <div class="card" id="result-card" style="display:none;">
        <div id="output"></div>
    </div>

    <nav class="nav">
        <button class="nav-btn active">📝 Notes</button>
        <button class="nav-btn">✍️ Quiz</button>
        <button class="nav-btn">⚙️ Settings</button>
    </nav>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        const resultCard = document.getElementById('result-card');
        const fileNameLabel = document.getElementById('file-name');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. UI Updates
            fileNameLabel.innerText = file.name;
            loader.style.display = 'block';
            resultCard.style.display = 'none';

            // 2. Read the PDF
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                
                let fullText = "";
                // Loop through first 3 pages (to save memory on mobile)
                for(let i=1; i <= Math.min(pdf.numPages, 3); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(" ");
                }

                processWithAI(fullText);
            };
            reader.readAsArrayBuffer(file);
        });

        function processWithAI(text) {
            // This simulates an AI summary logic
            setTimeout(() => {
                loader.style.display = 'none';
                resultCard.style.display = 'block';
                
                const summary = text.substring(0, 300) + "..."; // Grabs first 300 chars
                
                output.innerHTML = `
                    <div class="highlight">AI SUMMARY:</div>
                    <p>${summary}</p>
                    <div class="highlight">KEY CONCEPTS:</div>
                    <ul>
                        <li>Topic identified from document</li>
                        <li>Automated study point 1</li>
                        <li>Automated study point 2</li>
                    </ul>
                `;
            }, 2000);
        }
    </script>
</body>
</html>
